<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SpiceHub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#000;
    overflow-x:hidden;
}

/* HERO SECTION */

.hero{
    min-height:100vh;
    position:relative;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:50px 20px;
}

/* GLOW EFFECTS */

.glow{
    position:absolute;
    border-radius:50%;
    filter:blur(180px);
}

.glow1{
    width:500px;
    height:500px;
    background:#2563eb;
    top:-150px;
    left:-100px;
    opacity:.5;
}

.glow2{
    width:450px;
    height:450px;
    background:#9333ea;
    top:20%;
    right:-100px;
    opacity:.45;
}

.glow3{
    width:400px;
    height:400px;
    background:#06b6d4;
    bottom:-100px;
    left:35%;
    opacity:.35;
}

.glow4{
    width:350px;
    height:350px;
    background:#f97316;
    bottom:50px;
    right:20%;
    opacity:.25;
}

/* CONTENT */

.content{
    position:relative;
    z-index:10;
    width:100%;
    max-width:1200px;
    text-align:center;
}

.content h1{
    color:white;
    font-size:6rem;
    font-weight:800;
    margin-bottom:10px;
}

.subtitle{
    color:#d4d4d4;
    font-size:1.4rem;
    margin-bottom:40px;
}

/* MENU CARDS */

.menu-grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;

    margin-bottom:50px;
}

.menu-card{

    color:white;

    padding:14px 28px;

    background:
    rgba(255,255,255,.08);

    border:
    1px solid rgba(255,255,255,.1);

    border-radius:50px;

    backdrop-filter:blur(20px);

    transition:.3s;
}

.menu-card:hover{

    transform:translateY(-5px);

    border-color:#3b82f6;

    box-shadow:
    0 0 25px rgba(59,130,246,.4);
}

/* CHATBOT CARD */

.chatbot-container{

    width:100%;
    max-width:1000px;

    margin:auto;

    background:
    linear-gradient(
        180deg,
        rgba(20,20,20,.95),
        rgba(0,0,0,.95)
    );

    border:
    1px solid rgba(255,255,255,.08);

    border-radius:35px;

    padding:25px;

    backdrop-filter:blur(30px);

    box-shadow:
    0 25px 80px rgba(0,0,0,.8);
}

/* DIALOGFLOW */

df-messenger {
    --df-messenger-bot-message: #1e1e1e;
    --df-messenger-user-message: #2563eb;
    --df-messenger-chat-background: #000000;
    --df-messenger-font-color: white;
    --df-messenger-button-titlebar-color: #111111;
    --df-messenger-send-icon: #3b82f6;
}


/* LOCATION */

.location{

    margin-top:40px;

    color:white;

    font-size:1.1rem;

    opacity:.8;
}

/* MOBILE */

@media(max-width:768px){

    .content h1{
        font-size:3rem;
    }

    .subtitle{
        font-size:1rem;
    }

    .chatbot-container{
        padding:15px;
    }

    df-messenger{
        height:600px;
    }
}

</style>
</head>
<body>

<section class="hero">

    <div class="glow glow1"></div>
    <div class="glow glow2"></div>
    <div class="glow glow3"></div>
    <div class="glow glow4"></div>

    <div class="content">

        <h1>SpiceHub</h1>

        <p class="subtitle">
            Intelligent Food Ordering Chatbot
        </p>

        <div class="menu-grid">

            <div class="menu-card">🍕 Pizza</div>
            <div class="menu-card">🥘 Pav Bhaji</div>
            <div class="menu-card">🍛 Biryani</div>
            <div class="menu-card">🥤 Mango Lassi</div>
            <div class="menu-card">🥞 Masala Dosa</div>
            <div class="menu-card">🌮 Vada Pav</div>
            <div class="menu-card">🥟 Samosa</div>
            <div class="menu-card">🥘 Chole Bhature</div>
            <div class="menu-card">🥞 Rava Dosa</div>

        </div>

        <div class="chatbot-container">

            <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>

            <df-messenger
                intent="WELCOME"
                chat-title="SpiceHub Bot"
                agent-id="12c9668e-7349-4bc4-9a27-3284d41cea92"
                language-code="en">
            </df-messenger>

        </div>

        <div class="location">
            📍 Patancheru, Hyderabad, Telangana
        </div>

    </div>

</section>

</body>
</html>
